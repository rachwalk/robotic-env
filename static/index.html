<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robotic Environment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0d1117;
      font-family: 'Courier New', monospace;
      color: #c9d1d9;
    }

    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    /* ---- HUD overlay ---- */
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 18px;
      pointer-events: none;
      gap: 12px;
    }

    .panel {
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 14px;
      backdrop-filter: blur(6px);
    }

    #hud {
      min-width: 220px;
      font-size: 12px;
      line-height: 1.8;
    }

    #hud h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #58a6ff;
      margin-bottom: 6px;
    }

    .robot-entry { margin-bottom: 10px; padding-left: 8px; }
    .robot-entry + .robot-entry { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; }
    .robot-name { font-weight: bold; font-size: 11px; margin-bottom: 2px; }
    .hud-row { display: flex; justify-content: space-between; gap: 16px; }
    .hud-label { color: #8b949e; }
    .hud-value { color: #e6edf3; }
    .hud-moving { color: #f0883e; }
    .hud-idle   { color: #3fb950; }

    #controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: all;
    }

    #status {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      text-align: center;
    }
    .connected    { background: #0d3320; color: #3fb950; border: 1px solid #3fb950; }
    .disconnected { background: #3d1c1c; color: #f85149; border: 1px solid #f85149; }

    button {
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid rgba(88, 166, 255, 0.35);
      color: #58a6ff;
      padding: 7px 13px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover {
      background: rgba(56, 139, 253, 0.15);
      border-color: #58a6ff;
    }

    /* ---- Bottom hint bar ---- */
    #hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(13,17,23,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 11px;
      color: #6e7681;
      white-space: nowrap;
    }
    #hint code { color: #79c0ff; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <!-- Left: robot state HUD -->
  <div class="panel" id="hud">
    <h3>Robots</h3>
    <div id="hud-robots"></div>
  </div>

  <!-- Right: controls -->
  <div id="controls">
    <span id="status" class="disconnected">Disconnected</span>
    <button id="btn-view">Switch to Angled View</button>
  </div>
</div>

<div id="hint">
  API &nbsp;|&nbsp;
  <code>POST /go_to_position</code> &nbsp;
  <code>POST /grab</code> &nbsp;
  <code>POST /release</code> &nbsp;
  <code>POST /rotate</code> &nbsp;
  <code>GET /camera</code>
</div>

<!-- Three.js via import map (no bundler required) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module" src="/js/app.js"></script>

</body>
</html>
